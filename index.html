<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LITMUS Scrum Board</title>
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <div id="appShell" class="app-shell">
    <header class="topbar">
      <div>
        <h1>LITMUS</h1>
        <p>Scrum Board & Ticket Tracker</p>
      </div>
      <div class="topbar-actions">
        <button id="openAddDateBtn" class="btn" type="button">+ Date</button>
        <button id="openCreateTicketBtn" class="btn accent" type="button">+ Ticket</button>
        <button id="openAddTaskBtn" class="btn" type="button">+ Task</button>
      </div>
    </header>

    <nav class="tabs">
      <button class="tab-btn active" data-target="board">Board</button>
      <button class="tab-btn" data-target="tickets">Tickets</button>
      <button class="tab-btn" data-target="setup">Setup</button>
    </nav>

    <main>
      <section id="tab-board" class="tab-panel active">
        <div class="panel-controls">
          <span id="weekSummary" class="empty-state">Loading board...</span>
          <div style="display: flex; gap: 8px;">
            <button id="refreshBoardBtn" class="btn" type="button">Refresh</button>
            <button id="saveBoardBtn" class="btn accent" type="button">Save Changes</button>
          </div>
        </div>
        <div class="table-wrap">
          <table>
            <thead id="boardHead"></thead>
            <tbody id="boardBody"></tbody>
          </table>
        </div>
      </section>

      <section id="tab-tickets" class="tab-panel">
        <div class="filters-bar" id="ticketsFilterBar" style="display: flex; gap: 16px; margin-bottom: 16px; align-items: flex-end; flex-wrap: wrap;">
          <div class="field" style="margin-bottom: 0;">
            <label for="filterStatusSelect">Status</label>
            <select id="filterStatusSelect" class="select">
              <option value="">All</option>
            </select>
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="filterAssigneeSelect">Assignee</label>
            <select id="filterAssigneeSelect" class="select">
              <option value="">All</option>
            </select>
          </div>
          <div class="field" style="margin-bottom: 0;">
            <label for="filterPrioritySelect">Priority</label>
            <select id="filterPrioritySelect" class="select">
              <option value="">All</option>
            </select>
          </div>
          <button id="clearFiltersBtn" class="btn" type="button" style="height: 38px;">Clear</button>
        </div>
        <div id="ticketsContainer" class="ticket-grid"></div>
      </section>

      <section id="tab-setup" class="tab-panel">
        <div class="setup-grid">
          <div class="field">
            <label for="siteUrlInput">NETLIFY_SITE_URL</label>
            <input id="siteUrlInput" class="input" type="text" />
          </div>
        </div>
        <div class="panel-controls">
          <button id="saveSetupBtn" class="btn accent" type="button">Save Setup</button>
          <button id="testConnectionBtn" class="btn" type="button">Test connection</button>
        </div>

        <div class="field">
          <label>Members</label>
          <div id="membersEditor" class="members-editor"></div>
        </div>

        <button id="addMemberBtn" class="btn" type="button">+ add member</button>
      </section>
    </main>
  </div>

  <div id="createTicketModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>Create Ticket</h3>
      <div class="modal-grid">
        <div class="field full">
          <label for="ticketTitleInput">Title</label>
          <input id="ticketTitleInput" class="input" type="text" placeholder="Short description" />
        </div>
        <div class="field full">
          <label for="ticketDescInput">Description (Markdown)</label>
          <textarea id="ticketDescInput" class="textarea" placeholder="Detailed requirements..."></textarea>
        </div>
        <div class="field">
          <label for="ticketStatusSelect">Status</label>
          <select id="ticketStatusSelect" class="select"></select>
        </div>
        <div class="field">
          <label for="ticketAssigneeSelect">Assignee</label>
          <select id="ticketAssigneeSelect" class="select"></select>
        </div>
        <div class="field">
          <label for="ticketPrioritySelect">Priority</label>
          <select id="ticketPrioritySelect" class="select"></select>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelCreateTicketBtn" class="btn" type="button">Cancel</button>
        <button id="createTicketSubmitBtn" class="btn accent" type="button">Create</button>
      </div>
    </div>
  </div>

  <div id="editTicketModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>Edit Ticket</h3>
      <div class="modal-grid">
        <input type="hidden" id="editTicketIdInput" />
        <div class="field full">
          <label for="editTicketTitleInput">Title</label>
          <input id="editTicketTitleInput" class="input" type="text" placeholder="Short description" />
        </div>
        <div class="field full">
          <label for="editTicketDescInput">Description (Markdown)</label>
          <textarea id="editTicketDescInput" class="textarea" placeholder="Detailed requirements..."></textarea>
        </div>
        <div class="field">
          <label for="editTicketStatusSelect">Status</label>
          <select id="editTicketStatusSelect" class="select"></select>
        </div>
        <div class="field">
          <label for="editTicketAssigneeSelect">Assignee</label>
          <select id="editTicketAssigneeSelect" class="select"></select>
        </div>
        <div class="field">
          <label for="editTicketPrioritySelect">Priority</label>
          <select id="editTicketPrioritySelect" class="select"></select>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelEditTicketBtn" class="btn" type="button">Cancel</button>
        <button id="editTicketSubmitBtn" class="btn accent" type="button">Save Changes</button>
      </div>
    </div>
  </div>

  <div id="addTaskModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>Add Task to Board</h3>
      <div class="modal-grid">
        <div class="field">
          <label for="taskDateSelect">Date</label>
          <select id="taskDateSelect" class="select"></select>
        </div>
        <div class="field">
          <label for="taskMemberSelect">Member</label>
          <select id="taskMemberSelect" class="select"></select>
        </div>
        <div class="field full">
          <label for="taskTicketSelect">Link Ticket (Optional)</label>
          <select id="taskTicketSelect" class="select"></select>
        </div>
        <div class="field full">
          <label for="taskTextInput">Free Text (Markdown)</label>
          <textarea id="taskTextInput" class="textarea" placeholder="What are you working on?"></textarea>
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelAddTaskBtn" class="btn" type="button">Cancel</button>
        <button id="addTaskSubmitBtn" class="btn accent" type="button">Add Task</button>
      </div>
    </div>
  </div>

  <div id="addDateModal" class="modal hidden" aria-hidden="true">
    <div class="modal-card">
      <h3>Add New Date</h3>
      <div class="modal-grid">
        <div class="field full">
          <label for="newDateInput">Date (YYYY-MM-DD)</label>
          <input id="newDateInput" class="input" type="date" />
        </div>
      </div>
      <div class="modal-actions">
        <button id="cancelAddDateBtn" class="btn" type="button">Cancel</button>
        <button id="addDateSubmitBtn" class="btn accent" type="button">Add Date</button>
      </div>
    </div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
